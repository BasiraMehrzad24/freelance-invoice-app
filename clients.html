<!-- // Client management -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="">
    <title>Clients</title>
 </head>
 <body>
    <div class="dashboard">

        <aside class="sidebar">
            <h2 class="logo">FreelanceHub</h2>

            <nav>
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="invoices.html">Invoices</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <header class="topbar">
                <section class="clients-section">

                  <div class="form-card">
                      <h2>Add New Client</h2>

                          <form class="client-form" id="addNewClient">
                             <div class="form-group">
                                <input type="text" id="name" placeholder="Client Name">

                                <small id="name-error" class="error-message"></small>
                           </div>

                        <div class="form-group">
                            <input type="email" id="email" placeholder="Client Email">
 
                           <small id="email-error" class="error-message"></small>
                        </div>
 
                             <input type="text" placeholder="Company Name" id="company">

                             <textarea placeholder="Notes" id="note"></textarea>

                             <button type="submit">Add Client</button>

                        </form>
                </div>


    <div class="table-card">
        <div class="table-header">
            <h2>Clients List</h2>
        </div>
    <div class="table-container">
      <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody  id="clients-list">
            </tbody>
        </table>

    </div>

      

    </div>

</section>
</header>
</main>
</div>

<script type="module" src="js/utils.js"></script>
<script src="js/clients.js"></script>
 </body>
 </html>
