<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Invoice & Client Management Application </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>

    </header>

    <div class="dashboard">

        <aside class="sidebar">
            <h2 class="logo">FreelanceCore</h2>

            <nav>
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="clients.html">Clients</a></li>
                    <li><a href="invoices.html">Invoices</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
<section class="dashboard-stats">

    <div class="stat-card">
        <h3>Total Clients</h3>
        <p id="total-clients">0</p>
    </div>

    <div class="stat-card">
        <h3>Total Invoices</h3>
        <p id="total-invoices">0</p>
    </div>

    <div class="stat-card">
        <h3>Total Revenue</h3>
        <p id="total-revenue">$0</p>
    </div>

    <div class="stat-card">
        <h3>Paid Invoices</h3>
        <p id="paid-invoices">0</p>
    </div>

    <div class="stat-card">
        <h3>Unpaid Invoices</h3>
        <p id="unpaid-invoices">0</p>
    </div>

</section>


<section class="quote-section">

    <div class="quote-card">

        <h2>Daily Motivation</h2>

        <p id="quote">
            Loading quote...
        </p>

        <span id="author">
            -
        </span>

    </div>

</section>

        </main>

    </div>


    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
